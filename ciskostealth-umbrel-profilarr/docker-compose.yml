version: "3.7"

services:

  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: ciskostealth-umbrel-profilarr_profilarr_1
      APP_PORT: 6868

  profilarr:
    image: santiagosayshey/profilarr:v1.1.4
    environment:
      - TZ=EST
      - PUID=99
      - PGID=100
    volumes:
      - ${APP_DATA_DIR}/data:/config
    restart: unless-stopped
