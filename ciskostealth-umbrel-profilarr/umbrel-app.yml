description: >-
  Profilarr is a profile builder and manager for Radarr and Sonarr. Create, customize, and manage quality profiles and custom formats with an intuitive visual interface.


  **Features:**

  - Visual profile builder for Radarr and Sonarr
  - Custom format management
  - Quality profile configuration
  - Easy-to-use web interface
  - Multi-instance support


  **Getting Started:**

  1. Open http://umbrel.local:6868 (or your device IP:6868)
  2. Configure your Radarr/Sonarr instance URLs and API keys
  3. Start building and managing your profiles


  **Setup Requirements:**

  - Radarr and/or Sonarr instances with API access
  - Internet connectivity (optional, for some features)

